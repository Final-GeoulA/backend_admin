spring.application.name=geoulA_admin
server.servlet.context-path=/back
server.port=81

#Devtools
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
spring.main.allow-bean-definition-overriding=true

#==== Datasource setting 
spring.sql.init.platform=oracle
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@192.168.56.1:1521:xe
spring.datasource.username=geoula11
spring.datasource.password=geoula11

# sql  # always =>  //embedded init
spring.sql.init.mode=never

# orm  : hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.dialect.db_major_version=11
spring.jpa.properties.hibernate.dialect.db_minor_version=2
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=debug
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.show-sql=true
# (update!) / create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.output.ansi.enabled=always


#-------------------------------- file upload settings
# static path - file Path
spring.web.resources.static-locations=file:uploads/,classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
spring.mvc.static-path-pattern=/**

# fileupload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-request-size=215MB

spring.main.allow-circular-references=true



